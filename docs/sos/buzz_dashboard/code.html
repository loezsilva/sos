<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .ripple-container {
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 2px solid theme('colors.primary');
            opacity: 0;
            animation: ripple-effect 3s infinite linear;
        }

        .ripple:nth-child(1) { animation-delay: 0s; }
        .ripple:nth-child(2) { animation-delay: 1s; }
        .ripple:nth-child(3) { animation-delay: 2s; }

        @keyframes ripple-effect {
            0% {
                width: 100px;
                height: 100px;
                opacity: 0.8;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
        
        .buzz-btn:active {
            box-shadow: inset 6px 6px 15px rgba(0,0,0,0.6), inset -6px -6px 15px rgba(255,255,255,0.05);
            transform: scale(0.95);
        }
    </style>

<body class="bg-background text-on-background min-h-screen font-body-md relative overflow-hidden flex flex-col items-center justify-center pt-16 pb-20 selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-[-1]">

</div>
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs px-3 py-1 rounded-full bg-surface-container-high border border-white/5 shadow-neumorphic text-xs font-label-bold">
<div class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_rgba(76,215,246,0.6)] animate-pulse"></div>
<span class="text-on-surface-variant">Available</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-bright active:scale-95 transition-all shadow-neumorphic text-outline hover:text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">sensors</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto flex-1 flex flex-col items-center justify-center relative px-margin-mobile z-10">
<!-- The Buzz Button -->
<div class="ripple-container w-[320px] h-[320px] flex items-center justify-center mb-12">
<div class="ripple"></div>
<div class="ripple"></div>
<div class="ripple"></div>
<button class="buzz-btn relative z-10 w-48 h-48 rounded-full bg-surface-container shadow-neumorphic flex flex-col items-center justify-center gap-sm border border-white/5 transition-all duration-300 group">

<span class="material-symbols-outlined text-primary text-[64px]" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-button-text text-button-text text-on-surface tracking-wider">BUZZ</span>
