{% load static %}

<div id="alerta-buzina" class="hidden fixed inset-0 z-[100] bg-background overflow-y-auto overflow-x-hidden" aria-live="assertive" role="alertdialog" aria-modal="true">
  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[600px] max-h-[600px] bg-primary/15 rounded-full blur-[100px] animacao-flutuar"></div>
    <div class="absolute top-1/3 right-1/4 w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-secondary/10 rounded-full blur-[80px] animacao-flutuar" style="animation-delay: -2s;"></div>
  </div>

  <main class="relative z-10 flex flex-col items-center w-full min-h-[100dvh] px-margin-mobile py-lg md:px-margin-desktop max-w-md mx-auto">
    <header class="w-full text-center mt-sm flex-shrink-0">
      <h1 id="alerta-titulo" class="font-display-lg-mobile text-display-lg-mobile text-on-surface mb-1 tracking-tighter">
        Cutucão recebido
      </h1>
      <p id="alerta-subtitulo" class="font-headline-md text-headline-md text-primary animate-pulse">
        Prioridade urgente
      </p>
    </header>

    <div class="flex flex-col items-center gap-4 w-full my-lg flex-shrink-0">
      <div class="relative flex items-center justify-center w-48 h-48 md:w-64 md:h-64">
        <div class="absolute inset-0 rounded-full border-2 border-primary/40 animacao-ripple-alerta scale-110"></div>
        <div class="absolute inset-0 rounded-full border-2 border-secondary/40 animacao-ripple-alerta scale-110" style="animation-delay: 0.6s;"></div>
        <div class="absolute inset-0 rounded-full border-2 border-primary/20 animacao-ripple-alerta scale-[1.2]" style="animation-delay: 1.2s;"></div>
        <div class="relative z-20 w-full h-full rounded-full p-2 bg-gradient-to-tr from-primary to-primary-container shadow-cutuca-primary animacao-flutuar">
          <div id="alerta-avatar" class="w-full h-full rounded-full overflow-hidden border-4 border-white relative bg-surface-container-high flex items-center justify-center">
            <span class="material-symbols-outlined text-outline text-6xl md:text-7xl">person</span>
          </div>
        </div>
      </div>
      <p id="alerta-remetente" class="relative z-20 max-w-[90%] px-6 py-3 bg-surface rounded-full border border-outline-variant sombra-cutuca font-headline-md text-headline-md text-on-surface whitespace-nowrap truncate">—</p>
      <h2 id="alerta-contexto" class="text-center font-body-lg text-body-lg text-on-surface-variant px-2">
        está cutucando você!
      </h2>
      <p id="alerta-identidade-publica" class="hidden text-center text-xs font-label-bold text-on-surface-variant uppercase tracking-wide"></p>
      <p id="alerta-mensagem" class="hidden text-center font-headline-md text-headline-md text-on-surface px-2"></p>
    </div>

    <div class="w-full flex-shrink-0 flex flex-col gap-sm mb-lg z-20 mt-auto">
      <a id="alerta-localizacao" href="#" target="_blank" rel="noopener noreferrer" class="hidden w-full py-3 px-5 rounded-full bg-surface text-primary font-button-text border border-primary/30 sombra-cutuca hover:bg-primary/5 active:scale-[0.98] transition-all flex items-center justify-center gap-2 min-h-[48px]">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;" aria-hidden="true">location_on</span>
        <span>Ver localização no mapa</span>
      </a>

      <div id="alerta-respostas" class="grid grid-cols-1 gap-sm w-full">
        <button type="button" data-resposta="ja_vou" class="alerta-resposta w-full py-3 px-6 rounded-full bg-surface text-on-surface font-button-text border border-outline-variant sombra-cutuca hover:bg-surface-container-low active:scale-95 transition-all min-h-[48px]">
          Já vou
        </button>
        <button type="button" data-resposta="ocupado" class="alerta-resposta w-full py-3 px-6 rounded-full bg-surface text-on-surface font-button-text border border-outline-variant sombra-cutuca hover:bg-surface-container-low active:scale-95 transition-all min-h-[48px]">
          Tô ocupado
        </button>
        <button type="button" data-resposta="ligo_depois" class="alerta-resposta w-full py-3 px-6 rounded-full bg-surface text-on-surface font-button-text border border-outline-variant sombra-cutuca hover:bg-surface-container-low active:scale-95 transition-all min-h-[48px]">
          Ligo em 5 min
        </button>
      </div>

      <div class="flex justify-center pt-sm pb-md">
        <button type="button" id="alerta-recusar" class="w-16 h-16 rounded-full bg-error-container text-on-error-container sombra-cutuca active:scale-95 flex items-center justify-center transition-all" aria-label="Dispensar">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">close</span>
        </button>
      </div>
    </div>
  </main>
</div>

<div id="toast-buzz" class="toast-cutuca hidden fixed top-20 left-1/2 -translate-x-1/2 z-[90] px-6 py-3 font-body-md"></div>
