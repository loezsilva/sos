{% if user.is_authenticated %}
<div class="central-notificacoes relative">
  <button
    type="button"
    class="central-notificacoes-botao app-botao-icone relative"
    aria-label="Notificações{% if nao_lidas %} ({{ nao_lidas }} não lidas){% endif %}"
    aria-expanded="false"
  >
    <span class="material-symbols-outlined">notifications</span>
    <span
      class="central-notificacoes-contador absolute -top-1 -right-1 min-w-[1.125rem] h-[1.125rem] px-1 rounded-full bg-primary text-on-primary text-[10px] font-label-bold flex items-center justify-center {% if not nao_lidas %}hidden{% endif %}"
      aria-hidden="true"
    >{{ nao_lidas }}</span>
  </button>

  <div
    class="central-notificacoes-painel app-superficie hidden absolute right-0 top-full mt-2 w-[min(100vw-2rem,22rem)] max-h-[70dvh] overflow-hidden z-[60]"
    role="region"
    aria-label="Atividades recentes"
  >
    <div class="px-4 py-3 border-b border-outline-variant bg-surface">
      <p class="app-rotulo">Atividades recentes</p>
    </div>
    <div class="central-notificacoes-lista overflow-y-auto max-h-[calc(70dvh-3rem)]">
      {% for item in notificacoes_recentes %}
        {% include 'partials/item_notificacao.html' %}
      {% empty %}
        <p class="central-notificacoes-vazio px-4 py-8 text-center text-on-surface-variant font-body-md text-sm">
          Nenhuma atividade recente
        </p>
      {% endfor %}
    </div>
  </div>
</div>
{% endif %}
