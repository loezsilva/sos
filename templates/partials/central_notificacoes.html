{% if user.is_authenticated %}
<div class="central-notificacoes relative">
  <button
    type="button"
    class="central-notificacoes-botao relative w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-bright active:scale-95 transition-all sombra-neumorfica text-outline hover:text-primary"
    aria-label="Notificações{% if nao_lidas %} ({{ nao_lidas }} não lidas){% endif %}"
    aria-expanded="false"
  >
    <span class="material-symbols-outlined">notifications</span>
    <span
      class="central-notificacoes-contador absolute -top-1 -right-1 min-w-[1.125rem] h-[1.125rem] px-1 rounded-full bg-tertiary text-on-tertiary-fixed text-[10px] font-label-bold flex items-center justify-center {% if not nao_lidas %}hidden{% endif %}"
      aria-hidden="true"
    >{{ nao_lidas }}</span>
  </button>

  <div
    class="central-notificacoes-painel hidden absolute right-0 top-full mt-2 w-[min(100vw-2rem,22rem)] max-h-[70dvh] overflow-hidden rounded-xl border border-white/15 z-[60]"
    role="region"
    aria-label="Atividades recentes"
  >
    <div class="px-4 py-3 border-b border-white/10 bg-surface-container-highest/90">
      <h2 class="font-label-bold text-label-bold text-on-surface-variant uppercase text-xs">Atividades recentes</h2>
    </div>
    <div class="central-notificacoes-lista overflow-y-auto max-h-[calc(70dvh-3rem)]">
      {% for item in notificacoes_recentes %}
        {% include 'partials/item_notificacao.html' %}
      {% empty %}
        <p class="central-notificacoes-vazio px-4 py-8 text-center text-on-surface-variant font-body-md text-sm">
          Nenhuma atividade recente
        </p>
      {% endfor %}
    </div>
  </div>
</div>
{% endif %}
