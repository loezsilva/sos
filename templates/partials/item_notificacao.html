<a
  href="{% if item.membro_id %}{% url 'dashboard:chamar_contato' item.membro_id %}{% else %}#{% endif %}"
  class="item-notificacao flex items-center gap-3 px-4 py-3 hover:bg-surface-container-low transition-colors no-underline {% if not item.lida %}bg-primary-container/10{% endif %}"
  data-buzina-id="{{ item.buzina.id }}"
>
  <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center shrink-0 overflow-hidden border border-white/10">
    {% if item.contato.avatar %}
      <img class="w-full h-full object-cover" src="{{ item.contato.avatar.url }}" alt="{{ item.contato.name|default:item.contato.username }}">
    {% else %}
      <span class="material-symbols-outlined text-outline">person</span>
    {% endif %}
  </div>
  <div class="min-w-0 flex-1">
    <p class="font-button-text text-button-text text-on-surface truncate">
      {{ item.contato.name|default:item.contato.username }}
    </p>
    <p class="font-label-bold text-label-bold text-on-surface-variant text-xs mt-0.5 truncate">
      {{ item.rotulo }}
    </p>
  </div>
  <time class="font-label-bold text-label-bold text-outline text-xs shrink-0" datetime="{{ item.buzina.created_at|date:'c' }}">
    {{ item.buzina.created_at|timesince }} atrás
  </time>
</a>
