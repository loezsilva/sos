<div
  class="card-membro app-card-membro {% if not membro.pode_buzinar %}{{ membro.classe_card }}{% endif %} {{ membro.classe_borda_status }}"
  data-contato-id="{{ membro.contato_id }}"
  data-membro-id="{{ membro.id }}"
  data-status="{{ membro.status_para_dono }}"
  data-sou-favorito="{{ membro.sou_favorito_do_contato|yesno:'true,false' }}"
  data-favoritos-mutuos="{{ membro.favoritos_mutuos|yesno:'true,false' }}"
  data-chamar-url="{% url 'dashboard:chamar_contato' membro.id %}"
>
  <div class="flex items-center justify-between gap-md">
    <a href="{% url 'dashboard:chamar_contato' membro.id %}" class="flex items-center gap-md min-w-0 flex-1 no-underline {% if not membro.pode_buzinar %}pointer-events-none{% endif %}">
      <div class="relative shrink-0">
        {% if membro.contato.avatar %}
          <img class="avatar-cutuca w-14 h-14 border-2 border-surface" src="{{ membro.contato.avatar.url }}" alt="{{ membro.nome_exibicao }}">
        {% else %}
          <div class="avatar-cutuca w-14 h-14 border-2 border-surface">
            <span class="material-symbols-outlined text-outline text-2xl">person</span>
          </div>
        {% endif %}
        <div class="card-membro-indicador absolute bottom-0 right-0 w-3 h-3 rounded-full border-2 border-surface {{ membro.classe_indicador_status }}"></div>
      </div>
      <div class="min-w-0">
        <h3 class="font-button-text text-button-text text-on-surface truncate">{{ membro.nome_exibicao }}</h3>
        <p class="card-membro-status font-label-bold text-label-bold {{ membro.classe_cor_status }} mt-xs">{{ membro.rotulo_status_exibicao }}</p>
      </div>
    </a>
    <div class="flex items-center gap-sm shrink-0">
      <button
        type="button"
        class="botao-favorito w-10 h-10 min-w-[48px] min-h-[48px] rounded-full flex items-center justify-center sombra-cutuca transition-colors {% if membro.eh_vip %}bg-tertiary-container text-on-tertiary-container{% else %}bg-surface-container text-outline hover:text-tertiary{% endif %}"
        data-alternar-favorito="{{ membro.id }}"
        aria-label="{% if membro.eh_vip %}Remover dos favoritos{% else %}Marcar como favorito{% endif %}"
        aria-pressed="{{ membro.eh_vip|yesno:'true,false' }}"
      >
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if membro.eh_vip %}1{% else %}0{% endif %};">star</span>
      </button>
      <a
        href="{% url 'dashboard:chamar_contato' membro.id %}"
        class="card-membro-bolt shrink-0 w-10 h-10 min-w-[48px] min-h-[48px] rounded-full flex items-center justify-center sombra-cutuca no-underline {% if membro.pode_buzinar %}bg-primary text-on-primary{% else %}bg-surface-container text-outline pointer-events-none{% endif %}"
        aria-label="Cutucar {{ membro.nome_exibicao }}"
      >
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' {% if membro.pode_buzinar %}1{% else %}0{% endif %};">touch_app</span>
      </a>
    </div>
  </div>
</div>
